# Tema: Night City

[colors.primary]
background = "#090819"
foreground = "#6600FF"

[colors.cursor]
text = "CellBackground"
cursor = "#00FFFF"

[colors.selection]
text = "CellForeground"
background = "#4A7AFF"

[colors.normal]
black   = "#283034"
red     = "#FF0000"
green   = "#00FF80"
yellow  = "#FFD400"
blue    = "#E388FF"
magenta = "#9900FF"
cyan    = "#00E5FF"
white   = "#6600FF"

[colors.bright]
black   = "#FF1998"
red     = "#FF006E"
green   = "#83FF52"
yellow  = "#E5FF00"
blue    = "#42C6FF"
magenta = "#FF2AFC"
cyan    = "#3DD8FF"
white   = "#F4F6F9"

# Colores "dim" explícitos para texto atenuado (ANSI faint),
# como el autocompletado inline de PSReadLine (InlinePrediction).
[colors.dim]
black   = "#3A2A40"
red     = "#5C2035"
green   = "#2A5C40"
yellow  = "#5C5620"
blue    = "#3A2A5C"
magenta = "#4E2A5C"
cyan    = "#2A4E5C"
white   = "#4A4A58"