# Tema: Blue Matrix

[colors.primary]
background = "#101116"
foreground = "#00A2FF"

[colors.cursor]
text = "CellBackground"
cursor = "#76FF9F"

[colors.selection]
text = "CellForeground"
background = "#C1DEFF"

[colors.normal]
black   = "#101116"
red     = "#FF5680"
green   = "#00FF9C"
yellow  = "#FFFC58"
blue    = "#00B0FF"
magenta = "#D57BFF"
cyan    = "#76C1FF"
white   = "#C7C7C7"

[colors.bright]
black   = "#686868"
red     = "#FF6E67"
green   = "#5FFA68"
yellow  = "#FFFC67"
blue    = "#6871FF"
magenta = "#D682EC"
cyan    = "#60FDFF"
white   = "#FFFFFF"

# Colores "dim" explícitos para texto atenuado (ANSI faint),
# como el autocompletado inline de PSReadLine (InlinePrediction).
[colors.dim]
black   = "#3A3A3A"
red     = "#5C2A3E"
green   = "#2A5C40"
yellow  = "#5C5A30"
blue    = "#2A4A5C"
magenta = "#4E2A5C"
cyan    = "#2A4E5C"
white   = "#4A4E58"