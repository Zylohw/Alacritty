# Tema: Laser

[colors.primary]
background = "#030D18"
foreground = "#F106E3"

[colors.cursor]
text = "CellBackground"
cursor = "#00FF9C"

[colors.selection]
text = "CellForeground"
background = "#2E206A"

[colors.normal]
black   = "#626262"
red     = "#FF8373"
green   = "#B4FB73"
yellow  = "#09B4BD"
blue    = "#FED300"
magenta = "#FF90FE"
cyan    = "#D1D1FE"
white   = "#F1F1F1"

[colors.bright]
black   = "#8F8F8F"
red     = "#FFC4BE"
green   = "#D6FCBA"
yellow  = "#FFFED5"
blue    = "#F92883"
magenta = "#FFB2FE"
cyan    = "#E6E7FE"
white   = "#FFFFFF"

# Colores "dim" explícitos para texto atenuado (ANSI faint),
# como el autocompletado inline de PSReadLine (InlinePrediction).
[colors.dim]
black   = "#3A3A3A"
red     = "#5C4038"
green   = "#4A5C38"
yellow  = "#5C5A40"
blue    = "#4A4A2A"
magenta = "#5C3A5C"
cyan    = "#3A3A5C"
white   = "#4A4E58"