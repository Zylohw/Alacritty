# Tema: VibrantInk

[colors.primary]
background = "#000000"
foreground = "#FFFFFF"

[colors.cursor]
text = "CellBackground"
cursor = "#FFFFFF"

[colors.selection]
text = "CellForeground"
background = "#B5D5FF"

[colors.normal]
black   = "#878787"
red     = "#FF6600"
green   = "#CCFF04"
yellow  = "#FFCC00"
blue    = "#44B4CC"
magenta = "#9933CC"
cyan    = "#44B4CC"
white   = "#E5E5E5"

[colors.bright]
black   = "#555555"
red     = "#FF0000"
green   = "#00FF00"
yellow  = "#FFFF00"
blue    = "#0000FF"
magenta = "#FF00FF"
cyan    = "#00FFFF"
white   = "#F5F5F5"

# Colores "dim" explícitos para texto atenuado (ANSI faint),
# como el autocompletado inline de PSReadLine (InlinePrediction).
[colors.dim]
black   = "#3A3A3A"
red     = "#5C2A20"
green   = "#4A5C20"
yellow  = "#5C5220"
blue    = "#204A5C"
magenta = "#4E205C"
cyan    = "#204A5C"
white   = "#4A4E4A"