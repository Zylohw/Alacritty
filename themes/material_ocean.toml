# Tema: MaterialOcean (activo por defecto)

[colors.primary]
background = "#0F111A"
foreground = "#8F93A2"

[colors.cursor]
text = "CellBackground"
cursor = "#FFCC00"

[colors.selection]
text = "CellForeground"
background = "#1F2233"

[colors.normal]
black   = "#546E7A"
red     = "#FF5370"
green   = "#C3E88D"
yellow  = "#FFCB6B"
blue    = "#82AAFF"
magenta = "#C792EA"
cyan    = "#89DDFF"
white   = "#FFFFFF"

[colors.bright]
black   = "#546E7A"
red     = "#FF5370"
green   = "#C3E88D"
yellow  = "#FFCB6B"
blue    = "#82AAFF"
magenta = "#C792EA"
cyan    = "#89DDFF"
white   = "#FFFFFF"

# Colores "dim" explícitos para texto atenuado (ANSI faint),
# como el autocompletado inline de PSReadLine (InlinePrediction).
[colors.dim]
black   = "#3A3A3A"
red     = "#5C2A34"
green   = "#4A5C3E"
yellow  = "#5C5230"
blue    = "#3A4A5C"
magenta = "#4E3A5C"
cyan    = "#3A555C"
white   = "#4A4E58"